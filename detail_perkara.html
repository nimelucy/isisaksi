<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Detail Perkara & Saksi</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_blue.css" />

    <style>
        * { box-sizing: border-box; }
        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            padding: 10px 8px;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container-form {
            max-width: 960px;
            width: 100%;
            background: #fff;
            border-radius: 8px;
            padding: 14px 12px 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .title-form {
            font-size: 18px;
            font-weight: bold;
            color: #648C03;
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 12px;
            border-bottom: 2px solid #e8edf2;
        }

        /* ===== INFO PERKARA ===== */
        .info-perkara {
            background: #f8fafc;
            border: 1px solid #dde4ec;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 13px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 12px;
        }
        .info-perkara .label-info { font-weight: 600; color: #34495e; }
        .info-perkara .value-info { color: #2c3e50; word-break: break-word; }

        .saksi-list { margin-top: 6px; }

        /* ===== CARD SAKSI ===== */
        .saksi-card {
            border: 1px solid #dde4ec;
            border-radius: 6px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 13px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 10px;
            background: #ffffff;
        }

        /* ===== LABEL DI KIRI (BERWARNA) ===== */
        .saksi-card .saksi-label {
            font-weight: 600;
            color: #34495e;
            font-size: 13px;
            background: #e8f4fd; /* biru sangat muda */
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ===== VALUE DI KANAN (PUTIH) ===== */
        .saksi-card .saksi-value {
            color: #2c3e50;
            word-break: break-word;
            padding: 2px 4px;
        }

        /* ===== HEADER CARD ===== */
        .saksi-card .saksi-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 4px;
            margin-bottom: 4px;
            border-bottom: 1px solid #e8edf2;
        }
        .saksi-card .saksi-header .saksi-nomor {
            font-weight: bold;
            font-size: 14px;
            color: #2c3e50;
        }
        .saksi-card .saksi-header .saksi-badge {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            background: #d4edda;
            color: #155724;
        }
        .saksi-card .saksi-header .saksi-badge.draft {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-saksi {
            text-align: center;
            color: #95a5a6;
            padding: 20px 0;
            font-size: 14px;
        }
        .saksi-count {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            display: block;
            text-align: right;
        }

        .btn-group-form { text-align: center; padding-top: 14px; border-top: 2px solid #e8edf2; margin-top: 14px; }
        .btn-group-form .btn {
            display: block;
            padding: 12px 20px;
            margin: 4px 0;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            background: #e8edf2;
            color: #333;
            width: 100%;
        }
        .btn-group-form .btn:hover { opacity: 0.85; }
        .btn-tambah-saksi { background: #2ecc71 !important; color: #fff !important; }
        .btn-tambah-saksi:hover { background: #27ae60 !important; }
        .btn-kembali { background: #d5dce3 !important; color: #222 !important; }
        .btn-kembali:hover { background: #c0c8d1 !important; }

        .alert-success {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            font-size: 14px;
        }
        .label-privasi { font-size: 11px; color: #95a5a6; margin-top: 8px; text-align: center; border-top: 1px solid #eee; padding-top: 8px; }

        @media (max-width: 600px) {
            body { padding: 6px 4px; }
            .container-form { padding: 10px 8px; }
            .title-form { font-size: 16px; padding-bottom: 8px; margin-bottom: 8px; }
            .info-perkara { font-size: 12px; padding: 8px 10px; grid-template-columns: 1fr; gap: 2px; }
            .saksi-card {
                font-size: 12px;
                padding: 8px 10px;
                grid-template-columns: 1fr;
                gap: 2px;
            }
            .saksi-card .saksi-header { flex-direction: column; align-items: flex-start; gap: 4px; }
            .saksi-card .saksi-label { display: inline-block; min-width: 80px; background: #e8f4fd; padding: 2px 8px; border-radius: 4px; }
            .saksi-card .saksi-value { display: inline-block; }
            .btn-group-form .btn { padding: 14px; font-size: 16px; }
            .label-privasi { font-size: 10px; }
            .alert-success { font-size: 13px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

<div class="container-form">
    <div class="title-form">📋 Detail Perkara &amp; Saksi</div>

    <div id="alertSuccess" class="alert-success"><strong>Sukses!</strong> Saksi berhasil ditambahkan.</div>

    <div class="info-perkara" id="infoPerkara"></div>

    <div class="saksi-list">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <h4 style="margin:4px 0; font-size:15px;">Daftar Saksi</h4>
            <span class="saksi-count" id="saksiCount">Total: 0</span>
        </div>
        <div id="saksiContainer"></div>
    </div>

    <div class="btn-group-form">
        <button id="btnTambahSaksi" class="btn btn-tambah-saksi">+ Tambah Saksi</button>
        <button type="button" id="kembaliBtn" class="btn btn-kembali">Kembali</button>
    </div>

    <div class="label-privasi">
        ⚠️ Data publik sesuai ketentuan perundang-undangan.
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    var perkara = JSON.parse(localStorage.getItem('perkara_dipilih'));
    if (!perkara || !perkara.value) {
        perkara = JSON.parse(sessionStorage.getItem('perkara_dipilih'));
        if (perkara && perkara.value) {
            localStorage.setItem('perkara_dipilih', JSON.stringify(perkara));
        }
    }

    if (!perkara || !perkara.value) {
        window.location.href = 'cari_perkara.html';
        return;
    }

    if (!perkara.key_saksi) {
        perkara.key_saksi = 'saksi_' + perkara.value.replace(/[\/\.]/g, '_');
        localStorage.setItem('perkara_dipilih', JSON.stringify(perkara));
    }

    renderInfoPerkara(perkara);
    renderSaksiList(perkara.key_saksi);

    $('#kembaliBtn').on('click', function() {
        window.location.href = 'cari_perkara.html';
    });

    $('#btnTambahSaksi').on('click', function() {
        localStorage.setItem('perkara_dipilih', JSON.stringify(perkara));
        sessionStorage.setItem('perkara_dipilih', JSON.stringify(perkara));
        window.location.href = 'tambah_saksi.html';
    });

    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('status') === 'sukses') {
        $('#alertSuccess').show().delay(4000).fadeOut();
        window.history.replaceState({}, document.title, window.location.pathname);
        setTimeout(function() {
            renderSaksiList(perkara.key_saksi);
        }, 500);
    }

    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            renderSaksiList(perkara.key_saksi);
        }
    });

    function renderInfoPerkara(data) {
        var html = '';
        var labelP = (data.tipe === 'talak') ? 'Pemohon' : 'Penggugat';
        var labelT = (data.tipe === 'talak') ? 'Termohon' : 'Tergugat';
        html += `<span class="label-info">Nomor</span><span class="value-info">${data.value}</span>`;
        html += `<span class="label-info">Klasifikasi</span><span class="value-info">${data.klasifikasi || '-'}</span>`;
        html += `<span class="label-info">Status</span><span class="value-info">${data.status || '-'}</span>`;
        if (data.tipe === 'permohonan') {
            html += `<span class="label-info">Pemohon</span><span class="value-info">${data.pemohon || '-'}</span>`;
            if (data.termohon) html += `<span class="label-info">Termohon</span><span class="value-info">${data.termohon || '-'}</span>`;
        } else {
            html += `<span class="label-info">${labelP}</span><span class="value-info">${data.penggugat || '-'}</span>`;
            html += `<span class="label-info">${labelT}</span><span class="value-info">${data.tergugat || '-'}</span>`;
        }
        $('#infoPerkara').html(html);
    }

    function isDataLengkap(s) {
        return s.nama && s.nama.trim() !== '' &&
               s.alamat && s.alamat.trim() !== '' &&
               s.jenis_kelamin && s.jenis_kelamin.trim() !== '';
    }

    function renderSaksiList(key) {
        var saksiList = JSON.parse(localStorage.getItem(key)) || [];
        var container = $('#saksiContainer');
        var count = $('#saksiCount');

        if (saksiList.length === 0) {
            container.html('<div class="empty-saksi">Belum ada saksi ditambahkan.</div>');
            count.text('Total: 0');
            return;
        }

        var html = '';
        saksiList.forEach(function(s, i) {
            var lengkap = isDataLengkap(s);
            var badgeClass = lengkap ? '' : 'draft';
            var badgeText = lengkap ? 'Lengkap' : 'Draft';

            html += `
                <div class="saksi-card">
                    <div class="saksi-header">
                        <span class="saksi-nomor">Saksi ${i+1} - ${s.nama || '(Belum bernama)'}</span>
                        <span class="saksi-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <span class="saksi-label">Pihak</span>
                    <span class="saksi-value">${s.pihak || '-'}</span>
                    <span class="saksi-label">Nama</span>
                    <span class="saksi-value">${s.nama || '-'}</span>
                    <span class="saksi-label">Pekerjaan</span>
                    <span class="saksi-value">${s.pekerjaan || '-'}</span>
                    <span class="saksi-label">Tempat Lahir</span>
                    <span class="saksi-value">${s.tempat_lahir || '-'}</span>
                    <span class="saksi-label">Umur</span>
                    <span class="saksi-value">${s.umur || '-'}</span>
                    <span class="saksi-label">Jenis Kelamin</span>
                    <span class="saksi-value">${s.jenis_kelamin || '-'}</span>
                    <span class="saksi-label">Alamat</span>
                    <span class="saksi-value">${s.alamat || '-'}</span>
                </div>
            `;
        });
        container.html(html);
        count.text('Total: ' + saksiList.length);
    }
});
</script>
</body>
</html>
